name: Full Release

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            -   name: Checkout code
                uses: actions/checkout@v4
                with:
                    fetch-depth: 0

            -   name: Install pnpm
                uses: pnpm/action-setup@v4

            -   name: Setup Node
                uses: actions/setup-node@v4
                with:
                    node-version: 22
                    cache: 'pnpm'
                    cache-dependency-path: "**/pnpm-lock.yaml"

            -   name: Install and Build
                run: |
                    pnpm install --frozen-lockfile
                    pnpm -r build

            -   name: Package Backend
                run: |
                    mkdir -p release-backend
                    cp -r backend/dist backend/package.json backend/pnpm-lock.yaml backend/README.md backend/API.md release-backend/
                    [ -f "backend/.env" ] && cp backend/.env release-backend/
                    cp README.md LICENSE release-backend/
                    cd release-backend && zip -r ../garupa-speed-tracker-backend-${{ github.ref_name }}.zip .

            -   name: Package Frontend
                run: |
                    mkdir -p release-frontend
                    cp -r frontend/dist frontend/start-frontend.cjs frontend/package.json frontend/pnpm-lock.yaml frontend/README.md release-frontend/
                    [ -f "frontend/.env" ] && cp frontend/.env release-frontend/
                    cp LICENSE release-frontend/
                    cd release-frontend && zip -r ../garupa-speed-tracker-frontend-${{ github.ref_name }}.zip .

            -   name: Package Unified Workspace
                run: |
                    mkdir -p unified-bundle/backend unified-bundle/frontend

                    cp -r backend/dist backend/package.json backend/pnpm-lock.yaml backend/README.md backend/API.md unified-bundle/backend/
                    [ -f "backend/.env" ] && cp backend/.env unified-bundle/backend/

                    cp -r frontend/dist frontend/start-frontend.cjs frontend/package.json frontend/pnpm-lock.yaml frontend/README.md unified-bundle/frontend/
                    [ -f "frontend/.env" ] && cp frontend/.env unified-bundle/frontend/

                    cp pnpm-workspace.yaml pnpm-lock.yaml package.json README.md LICENSE unified-bundle/

                    cd unified-bundle && zip -r ../garupa-speed-tracker-unified-${{ github.ref_name }}.zip .

            -   name: Create GitHub Release
                uses: softprops/action-gh-release@v2
                with:
                    name: Release ${{ github.ref_name }}
                    generate_release_notes: true
                    files: |
                        garupa-speed-tracker-backend-${{ github.ref_name }}.zip
                        garupa-speed-tracker-frontend-${{ github.ref_name }}.zip
                        garupa-speed-tracker-unified-${{ github.ref_name }}.zip
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
